name: Deploy

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  set-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: tag
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
      - name: Verify package.json versions match tag
        run: |
          FRONT=$(node -p "require('./app/ai-ta-app/package.json').version")
          BACK=$(node -p "require('./service/ai-ta-api/package.json').version")
          TAG="${GITHUB_REF_NAME}"
          if [ "$FRONT" != "$TAG" ] || [ "$BACK" != "$TAG" ]; then
            echo "Version mismatch: tag=$TAG frontend=$FRONT backend=$BACK"
            echo "Bump both app/ai-ta-app/package.json and service/ai-ta-api/package.json to $TAG before tagging."
            exit 1
          fi

  deploy-frontend:
    needs: set-version
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/ai-ta-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy (remote build)
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-backend:
    needs: set-version
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  release:
    needs: [deploy-frontend, deploy-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
