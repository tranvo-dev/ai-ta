databases:
  - name: ai-ta-db
    plan: free
    databaseName: ai_ta
    postgresMajorVersion: "16"

services:
  - type: web
    name: ai-ta-api
    runtime: node
    plan: free
    region: singapore
    rootDir: service/ai-ta-api
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-ta-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DEFAULT_MODEL
        value: gemini-2.0-flash
      # Secrets — set in Render dashboard (sync: false)
      - key: API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
